      - name: Install Python dependencies
        working-directory: backend
        run: uv sync --frozen --package resume

      - name: Run tests
        run: pnpm --prefix frontend test:run

      - name: Build site (includes resume generation)
        env:
          SITE_URL: https://www.alexandermcintosh.com
          PUBLIC_API_URL: https://api.alexandermcintosh.com
        run: |
          pnpm --prefix frontend generate-resume
          pnpm --prefix frontend astro build --site "$SITE_URL"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
