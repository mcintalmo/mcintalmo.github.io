  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-backend:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      SEC_LIST_ID: ocid1.securitylist.oc1.us-chicago-1.aaaaaaaa32kmnksbkde67atfvdgeqtvul7qxundhayf6sja56ostsg4o5qdq
      VM_IP: 163.192.208.235
      OCI_CLI_USER: ${{ secrets.OCI_USER_OCID }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_TENANCY_OCID }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_PRIVATE_KEY }}
      OCI_CLI_REGION: us-chicago-1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install and Configure OCI CLI
        run: |
          pipx install oci-cli
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/key.pem
          chmod 600 ~/.oci/key.pem
          printf "[DEFAULT]\nuser=${{ secrets.OCI_USER_OCID }}\nfingerprint=${{ secrets.OCI_FINGERPRINT }}\nkey_file=/home/runner/.oci/key.pem\ntenancy=${{ secrets.OCI_TENANCY_OCID }}\nregion=us-chicago-1\n" > ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Whitelist Runner IP
        id: whitelist
        run: |
          RUNNER_IP=$(curl -s https://ifconfig.me || curl -s https://api.ipify.org)
          echo "RUNNER_IP=$RUNNER_IP" >> $GITHUB_ENV
          
          # Fetch current ingress rules
          CURRENT_RULES=$(oci network security-list get --security-list-id "${{ env.SEC_LIST_ID }}" --query "data.\"ingress-security-rules\"")
          echo "ORIGINAL_RULES<<EOF" >> $GITHUB_ENV
          echo "$CURRENT_RULES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          # Add new rule
          NEW_RULE=$(jq -n --arg ip "$RUNNER_IP" '{protocol: "6", source: ($ip + "/32"), sourceType: "CIDR_BLOCK", tcpOptions: {min: 22, max: 22}, stateless: false, description: "GitHub Actions temporary SSH access"}')
          NEW_RULES=$(echo "$CURRENT_RULES" | jq --argjson rule "$NEW_RULE" '. + [$rule]')
          
          # Apply new rules
          oci network security-list update --security-list-id "${{ env.SEC_LIST_ID }}" --ingress-security-rules "$NEW_RULES" --force

      - name: Deploy to OCI VM
        env:
          SSH_PRIVATE_KEY: ${{ secrets.VM_SSH_PRIVATE_KEY }}
        run: |
          set -x
          # Give OCI a few seconds to propagate security list rules
          sleep 5
          
          # Set up SSH directory
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Write SSH private key
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
          # Populate known_hosts with retries
          for i in {1..5}; do
            ssh-keyscan -t ed25519,rsa -H "${{ env.VM_IP }}" >> ~/.ssh/known_hosts && break || {
              echo "ssh-keyscan failed, retrying in 3 seconds..."
              sleep 3
            }
          done
          
          # Test SSH connection
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes -o ConnectTimeout=5 ubuntu@${{ env.VM_IP }} "echo 'SSH connection successful!'"
          
          # Sync files
          rsync -avz -e "ssh -i ~/.ssh/id_ed25519" --exclude 'node_modules' --exclude '.git' --exclude '.venv' --exclude 'dist' --exclude '.astro' --exclude 'backend/.env' ./ ubuntu@${{ env.VM_IP }}:/home/ubuntu/mcintalmo.github.io/
          
          # Rebuild and restart
          ssh -i ~/.ssh/id_ed25519 ubuntu@${{ env.VM_IP }} "sed -i '/rtc:/a \  node_ip: ${{ env.VM_IP }}' /home/ubuntu/mcintalmo.github.io/infra/livekit.yaml && cd /home/ubuntu/mcintalmo.github.io/infra && docker compose --profile telemetry build agent auth && docker compose --profile telemetry up -d && docker compose restart livekit"

      - name: Revoke Whitelist
        if: always()
        run: |
          if [ -n "$ORIGINAL_RULES" ]; then
            oci network security-list update --security-list-id "${{ env.SEC_LIST_ID }}" --ingress-security-rules "$ORIGINAL_RULES" --force
          fi
