services:

  agent:
    image: ghcr.io/mcintalmo/mcintalmo.github.io/agent:latest
    build:
      context: ../backend
      dockerfile: ./agent/Dockerfile
    network_mode: host
    restart: always
    env_file:
      - ../backend/.env
    environment:
      - LIVEKIT_URL=ws://localhost:7880
      - PYTHONPATH=agent/src
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
      - OTEL_SERVICE_NAME=agent-service
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_LOG_LEVEL=debug
      - PYTHONUNBUFFERED=1
      - OTEL_BSP_SCHEDULE_DELAY=100
    depends_on:
      livekit:
        condition: service_started
      whisper:
        condition: service_healthy
      kokoro:
        condition: service_healthy
      litellm:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  auth:
    image: ghcr.io/mcintalmo/mcintalmo.github.io/auth:latest
    build:
      context: ../backend
      dockerfile: ./auth/Dockerfile
    network_mode: host
    restart: always
    env_file:
      - ../backend/.env
    environment:
      - PYTHONPATH=auth/src
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
      - OTEL_SERVICE_NAME=auth-service
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_LOG_LEVEL=debug
      - PYTHONUNBUFFERED=1
      - OTEL_BSP_SCHEDULE_DELAY=100
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s


  livekit:
    image: livekit/livekit-server:latest
    command: --config /livekit.yaml
    volumes:
      - ./livekit.yaml:/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "8080:8080"
    restart: always
    env_file:
      - ../backend/.env



  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    environment:
      # Automatically downloads the model on first boot
      - WHISPER__MODEL=Systran/faster-whisper-tiny.en
    volumes:
      - ./models:/root/.cache/huggingface
    ports:
      - "10300:8000"
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    ports:
      - "8880:8880"
    volumes:
      - ./kokoro_cache:/app/cache
    restart: always
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s = socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8880))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  ollama-pull:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until curl -s http://localhost:11434/api/tags > /dev/null; do
        echo 'Waiting for Ollama to start...';
        sleep 2;
      done;
      echo 'Ollama started! Pulling qwen2.5:3b...';
      curl -s -X POST http://localhost:11434/api/pull -d '{\"name\": \"qwen2.5:3b\"}';
      echo 'Model pulled successfully!';
      "
    network_mode: host

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    network_mode: host
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: always
    env_file:
      - ../backend/.env
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/readiness')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    profiles:
      - dev
    build:
      context: ../frontend
      dockerfile: Dockerfile

  mcp:
    profiles:
      - dev
    build:
      context: ../backend
      dockerfile: ./mcp/Dockerfile

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    profiles:
      - telemetry
    volumes:
      - ./observability/otel/otel-collector.yaml:/etc/otel/config.yaml
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP

  jaeger:
    image: jaegertracing/jaeger:latest
    profiles:
      - telemetry
    ports:
      - "16686:16686" # UI
      - "14250:14250" # gRPC from collector

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - telemetry
    command:
      - '--config.file=/etc/prometheus/prometheus.yaml'
      - '--storage.tsdb.path=/prometheus'
    volumes:
      - ./observability/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  phoenix:
    image: arizephoenix/phoenix:latest
    profiles:
      - telemetry
    ports:
      - "6006:6006" # UI and OTLP HTTP
      - "4319:4317" # OTLP gRPC
    volumes:
      - phoenix_data:/root/.phoenix
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    profiles:
      - telemetry
    container_name: infra-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"

  alertmanager:
    image: prom/alertmanager:latest
    profiles:
      - telemetry
    container_name: infra-alertmanager
    restart: always
    ports:
      - "9093:9093"
    env_file:
      - ../.env
    volumes:
      - ./observability/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml.template
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp /etc/alertmanager/alertmanager.yml.template /tmp/alertmanager.yml
        sed -i "s|\$${SMTP_SMARTHOST}|$$SMTP_SMARTHOST|g" /tmp/alertmanager.yml
        sed -i "s|\$${SMTP_AUTH_USERNAME}|$$SMTP_AUTH_USERNAME|g" /tmp/alertmanager.yml
        sed -i "s|\$${SMTP_PASSWORD}|$$SMTP_PASSWORD|g" /tmp/alertmanager.yml
        sed -i "s|\$${ALERT_DESTINATION_EMAIL}|$$ALERT_DESTINATION_EMAIL|g" /tmp/alertmanager.yml
        exec /bin/alertmanager --config.file=/tmp/alertmanager.yml --storage.path=/alertmanager

volumes:
  prometheus_data:
  ollama_data:
  phoenix_data:
