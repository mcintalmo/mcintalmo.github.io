services:

  agent:
    image: ghcr.io/mcintalmo/mcintalmo.github.io/agent:latest
    build:
      context: ../backend
      dockerfile: ./agent/Dockerfile
    network_mode: host
    restart: always
    env_file:
      - ../backend/.env
    environment:
      - LIVEKIT_URL=ws://localhost:7880
      - PYTHONPATH=agent/src
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
      - OTEL_SERVICE_NAME=agent-service
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_LOG_LEVEL=debug
      - PYTHONUNBUFFERED=1
      - OTEL_BSP_SCHEDULE_DELAY=100
    depends_on:
      - livekit
      - whisper
      - kokoro
      - litellm

  auth:
    image: ghcr.io/mcintalmo/mcintalmo.github.io/auth:latest
    build:
      context: ../backend
      dockerfile: ./auth/Dockerfile
    network_mode: host
    restart: always
    env_file:
      - ../backend/.env
    environment:
      - PYTHONPATH=auth/src
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
      - OTEL_SERVICE_NAME=auth-service
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_LOG_LEVEL=debug
      - PYTHONUNBUFFERED=1
      - OTEL_BSP_SCHEDULE_DELAY=100





  livekit:
    image: livekit/livekit-server:latest
    command: --config /livekit.yaml
    volumes:
      - ./livekit.yaml:/livekit.yaml
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
      - "8080:8080"
    restart: always
    env_file:
      - ../backend/.env



  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    environment:
      # Automatically downloads the model on first boot
      - WHISPER__MODEL=Systran/faster-whisper-tiny.en
    volumes:
      - ./models:/root/.cache/huggingface
    ports:
      - "10300:8000"
    restart: always

  kokoro:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    ports:
      - "8880:8880"
    volumes:
      - ./kokoro_cache:/app/cache
    restart: always

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  ollama-pull:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    entrypoint: >
      /bin/sh -c "
      until curl -s http://localhost:11434/api/tags > /dev/null; do
        echo 'Waiting for Ollama to start...';
        sleep 2;
      done;
      echo 'Ollama started! Pulling qwen2.5:3b...';
      curl -s -X POST http://localhost:11434/api/pull -d '{\"name\": \"qwen2.5:3b\"}';
      echo 'Model pulled successfully!';
      "
    network_mode: host

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    network_mode: host
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: always
    env_file:
      - ../backend/.env
    depends_on:
      - ollama

  frontend:
    profiles:
      - dev
    build:
      context: ../frontend
      dockerfile: Dockerfile

  mcp:
    profiles:
      - dev
    build:
      context: ../backend
      dockerfile: ./mcp/Dockerfile

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    profiles:
      - telemetry
    volumes:
      - ./observability/otel/otel-collector.yaml:/etc/otel/config.yaml
    command: ["--config=/etc/otel/config.yaml"]
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP

  jaeger:
    image: jaegertracing/jaeger:latest
    profiles:
      - telemetry
    ports:
      - "16686:16686" # UI
      - "14250:14250" # gRPC from collector

  prometheus:
    image: prom/prometheus:latest
    profiles:
      - telemetry
    volumes:
      - ./observability/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  phoenix:
    image: arizephoenix/phoenix:latest
    profiles:
      - telemetry
    ports:
      - "6006:6006" # UI and OTLP HTTP
      - "4319:4317" # OTLP gRPC
    volumes:
      - phoenix_data:/root/.phoenix
    restart: always

volumes:
  prometheus_data:
  ollama_data:
  phoenix_data:
